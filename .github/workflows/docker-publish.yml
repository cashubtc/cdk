name: Publish Docker Images

on:
  # Release publishing is dispatched by static-build-publish.yml after static
  # binary artifacts have been uploaded.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and publish'
        required: true
      static_artifact_run_id:
        description: 'Workflow run ID containing the static binary artifacts'
        required: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: cashubtc/mintd

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: x86_64
            runner: self-hosted
            docker_platform: linux/amd64
            docker_arch: amd64
          - name: aarch64
            runner: ubuntu-24.04-arm
            docker_platform: linux/arm64
            docker_arch: arm64
        variant:
          - name: standard
            tag_suffix: ""
          - name: ldk-node
            tag_suffix: "-ldk-node"
    runs-on: ${{ matrix.arch.runner }}
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
      packages: write

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Determine tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          RAW_VERSION="${INPUT_TAG#refs/tags/}"
          if [[ -z "$RAW_VERSION" ]]; then
            echo "::error::A release tag is required"
            exit 1
          fi

          echo "raw_version=${RAW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${RAW_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Download static binary artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries-${{ matrix.arch.name }}
          path: ./static-bin
          run-id: ${{ inputs.static_artifact_run_id }}
          github-token: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Prepare Docker context
        env:
          VARIANT: ${{ matrix.variant.name }}
        run: |
          case "$VARIANT" in
            standard)
              binary=$(find ./static-bin -maxdepth 1 -type f -name 'cdk-mintd-*' ! -name 'cdk-mintd-ldk-*' | sort | head -n 1)
              ;;
            ldk-node)
              binary=$(find ./static-bin -maxdepth 1 -type f -name 'cdk-mintd-ldk-*' | sort | head -n 1)
              ;;
            *)
              echo "::error::Unknown Docker variant: $VARIANT"
              exit 1
              ;;
          esac

          if [[ -z "$binary" ]]; then
            echo "::error::No static binary artifact found for $VARIANT"
            find ./static-bin -maxdepth 1 -type f -print
            exit 1
          fi

          mkdir -p ./docker-build
          install -m 0755 "$binary" ./docker-build/cdk-mintd
          cp Dockerfile.static ./docker-build/Dockerfile

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./docker-build
          push: true
          pull: true
          platforms: ${{ matrix.arch.docker_platform }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}${{ matrix.variant.tag_suffix }}-${{ matrix.arch.docker_arch }}
          cache-from: type=gha,scope=mintd-${{ matrix.variant.name }}-${{ matrix.arch.docker_arch }}
          cache-to: type=gha,mode=max,scope=mintd-${{ matrix.variant.name }}-${{ matrix.arch.docker_arch }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: standard
            tag_suffix: ""
          - name: ldk-node
            tag_suffix: "-ldk-node"

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          RAW_VERSION="${INPUT_TAG#refs/tags/}"
          if [[ -z "$RAW_VERSION" ]]; then
            echo "::error::A release tag is required"
            exit 1
          fi

          VERSION="${RAW_VERSION#v}"
          IS_STABLE=false
          if PRERELEASE=$(gh release view "$RAW_VERSION" --json isPrerelease --jq '.isPrerelease' 2>/dev/null); then
            if [[ "$PRERELEASE" == "false" && "$VERSION" != *-* ]]; then
              IS_STABLE=true
            fi
          else
            echo "::warning::Release ${RAW_VERSION} was not found; only the exact Docker tag will be published"
          fi

          echo "raw_version=${RAW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_stable=${IS_STABLE}" >> "$GITHUB_OUTPUT"

      - name: Extract semver components
        id: semver
        env:
          VERSION_INPUT: ${{ steps.tag.outputs.version }}
        run: |
          VERSION="$VERSION_INPUT"
          # Strip leading 'v' if present
          VERSION="${VERSION#v}"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION#*.}"
          MINOR="${MINOR%%.*}"
          echo "major_minor=${MAJOR}.${MINOR}" >> "$GITHUB_OUTPUT"

      - name: Create versioned manifest
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}${{ matrix.variant.tag_suffix }}" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}${{ matrix.variant.tag_suffix }}-amd64" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}${{ matrix.variant.tag_suffix }}-arm64"

      - name: Create major.minor manifest
        if: ${{ steps.tag.outputs.is_stable == 'true' }}
        env:
          MAJOR_MINOR: ${{ steps.semver.outputs.major_minor }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${MAJOR_MINOR}${{ matrix.variant.tag_suffix }}" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}${{ matrix.variant.tag_suffix }}-amd64" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}${{ matrix.variant.tag_suffix }}-arm64"

      - name: Create latest manifest
        if: ${{ steps.tag.outputs.is_stable == 'true' }}
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest${{ matrix.variant.tag_suffix }}" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}${{ matrix.variant.tag_suffix }}-amd64" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}${{ matrix.variant.tag_suffix }}-arm64"
