name: "FFI - Publish All Bindings"

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to create for release (e.g. v0.17.0)"
        required: true
      cdk_version:
        description: 'CDK dependency version (e.g. 0.17.0). Defaults to release_tag without the "v" prefix.'
        required: false
      cdk_ref:
        description: "CDK git ref to publish from. Must match release_tag."
        required: false

jobs:
  dart:
    name: "Trigger Dart bindings"
    uses: ./.github/workflows/dart-publish.yml
    with:
      release_tag: ${{ inputs.release_tag }}
      cdk_version: ${{ inputs.cdk_version }}
      cdk_ref: ${{ inputs.cdk_ref }}
    secrets: inherit

  kotlin:
    name: "Trigger Kotlin bindings"
    uses: ./.github/workflows/kotlin-publish.yml
    with:
      release_tag: ${{ inputs.release_tag }}
      cdk_version: ${{ inputs.cdk_version }}
      cdk_ref: ${{ inputs.cdk_ref }}
    secrets: inherit

  swift:
    name: "Trigger Swift bindings"
    uses: ./.github/workflows/swift-publish.yml
    with:
      release_tag: ${{ inputs.release_tag }}
      cdk_version: ${{ inputs.cdk_version }}
      cdk_ref: ${{ inputs.cdk_ref }}
    secrets: inherit

  go:
    name: "Trigger Go bindings"
    uses: ./.github/workflows/go-publish.yml
    with:
      release_tag: ${{ inputs.release_tag }}
      cdk_version: ${{ inputs.cdk_version }}
      cdk_ref: ${{ inputs.cdk_ref }}
    secrets: inherit
