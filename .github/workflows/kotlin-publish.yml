name: "FFI - Kotlin Bindings"

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to create for release (e.g. v0.17.0)"
        required: true
      cdk_version:
        description: 'CDK dependency version (e.g. 0.17.0). Defaults to release_tag without the "v" prefix.'
        required: false
      cdk_ref:
        description: 'CDK git ref to publish from. Must match release_tag.'
        required: false
      prerelease:
        description: 'Mark the GitHub release as a pre-release'
        type: boolean
        default: false
  workflow_call:
    inputs:
      release_tag:
        type: string
        required: true
      cdk_version:
        type: string
        required: false
      cdk_ref:
        type: string
        required: false
      prerelease:
        type: boolean
        required: false
        default: false
env:
  CARGO_TERM_COLOR: ${{ vars.CARGO_TERM_COLOR }}
  TAG: ${{ inputs.release_tag }}
  CDK_REF: ${{ inputs.cdk_ref || inputs.release_tag }}
  RELEASE_BRANCH: release/${{ inputs.release_tag }}

jobs:
  validate-release-ref:
    name: "kotlin: Validate release ref"
    runs-on: ubuntu-latest
    steps:
      - name: Validate release ref
        shell: bash
        run: |
          if [[ "${CDK_REF}" != "${TAG}" ]]; then
            echo "::error::cdk_ref must match release_tag (${TAG}); got ${CDK_REF}"
            exit 1
          fi

          if [[ ! "${TAG}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::release_tag must be a version tag such as v0.17.0; got ${TAG}"
            exit 1
          fi

      - name: Verify release tag exists
        uses: actions/checkout@v5
        with:
          ref: refs/tags/${{ env.TAG }}
          fetch-depth: 1
          persist-credentials: false

  kotlin-sync-sources:
    name: "kotlin: Sync sources to cdk-kotlin"
    needs: [validate-release-ref]
    runs-on: ubuntu-latest
    steps:
      - name: Resolve variables
        run: |
          CDK_VER="${{ inputs.cdk_version }}"
          echo "CDK_VER=${CDK_VER:-${TAG#v}}" >> "$GITHUB_ENV"
          echo "RELEASE_VER=${TAG#v}" >> "$GITHUB_ENV"

      - name: Checkout monorepo
        uses: actions/checkout@v5
        with:
          ref: refs/tags/${{ env.TAG }}
          persist-credentials: false

      - name: Clone cdk-kotlin
        env:
          FFI_DEPLOY_KEY: ${{ secrets.FFI_DEPLOY_KEY }}
        run: |
          auth_header() {
            printf 'AUTHORIZATION: basic '
            printf 'x-access-token:%s' "${FFI_DEPLOY_KEY}" | base64 | tr -d '\n'
          }

          git -c "http.extraheader=$(auth_header)" \
            clone https://github.com/${{ vars.CDK_KOTLIN_REPO }}.git cdk-kotlin

      - name: Copy bindings/kotlin to cdk-kotlin
        run: |
          rsync -av --delete \
            --exclude='.github' \
            --exclude='target' \
            --exclude='.git' \
            bindings/kotlin/ cdk-kotlin/
          cp rust-toolchain.toml cdk-kotlin/

      - name: Update versions and resolve workspace references
        run: |
          echo "Setting CDK version to ${CDK_VER}, release version to ${RELEASE_VER}"

          # Helper: extract a value from [workspace.package] in root Cargo.toml
          ws_pkg() {
            sed -n '/^\[workspace\.package\]/,/^\[/p' Cargo.toml \
              | grep "^$1 " | head -1 | sed 's/.*= *"\(.*\)"/\1/'
          }

          # Helper: extract a workspace dependency version
          ws_dep_ver() {
            local line
            line=$(sed -n '/^\[workspace\.dependencies\]/,/^\[/p' Cargo.toml \
              | grep "^$1 " | head -1)
            # Handle both: dep = "version" and dep = { ..., version = "x", ... }
            if echo "$line" | grep -q 'version *= *"'; then
              echo "$line" | sed 's/.*version *= *"\([^"]*\)".*/\1/'
            else
              echo "$line" | sed 's/.*= *"\([^"]*\)".*/\1/'
            fi
          }

          # Read workspace values dynamically
          WS_EDITION=$(ws_pkg edition)
          WS_RUST_VERSION=$(ws_pkg rust-version)
          WS_LICENSE=$(ws_pkg license)
          WS_HOMEPAGE=$(ws_pkg homepage)
          WS_REPOSITORY=$(ws_pkg repository)
          WS_README=$(ws_pkg readme)
          WS_UNIFFI_VER=$(ws_dep_ver uniffi)

          echo "Workspace values: edition=${WS_EDITION} rust-version=${WS_RUST_VERSION} uniffi=${WS_UNIFFI_VER}"

          # Update gradle.properties version
          sed -i "s/^VERSION_NAME=.*/VERSION_NAME=${RELEASE_VER}/" cdk-kotlin/gradle.properties

          # Resolve workspace package fields in rust/Cargo.toml
          sed -i \
            -e "s/^edition\.workspace = true/edition = \"${WS_EDITION}\"/" \
            -e "s/^rust-version\.workspace = true/rust-version = \"${WS_RUST_VERSION}\"/" \
            -e "s/^license\.workspace = true/license = \"${WS_LICENSE}\"/" \
            -e "s|^homepage\.workspace = true|homepage = \"${WS_HOMEPAGE}\"|" \
            -e "s|^repository\.workspace = true|repository = \"${WS_REPOSITORY}\"|" \
            -e "s/^version\.workspace = true/version = \"${CDK_VER}\"/" \
            -e "s/^readme\.workspace = true/readme = \"${WS_README}\"/" \
            cdk-kotlin/rust/Cargo.toml

          # Resolve workspace dependency references
          sed -i \
            -e "s/^cdk-ffi\.workspace = true/cdk-ffi = { version = \"=${CDK_VER}\", default-features = false }/" \
            -e "s/cdk-ffi = { workspace = true/cdk-ffi = { version = \"=${CDK_VER}\"/" \
            -e "s/uniffi = { workspace = true/uniffi = { version = \"${WS_UNIFFI_VER}\"/" \
            cdk-kotlin/rust/Cargo.toml

          # Remove workspace lints reference
          sed -i '/^\[lints\]/,/^$/s/^workspace = true//' cdk-kotlin/rust/Cargo.toml

          # Add release profile
          printf '\n[profile.release]\nlto = true\nstrip = true\ncodegen-units = 1\n' >> cdk-kotlin/rust/Cargo.toml

          cat cdk-kotlin/gradle.properties
          echo "---"
          cat cdk-kotlin/rust/Cargo.toml

      - name: Push to cdk-kotlin release branch
        working-directory: cdk-kotlin
        env:
          FFI_DEPLOY_KEY: ${{ secrets.FFI_DEPLOY_KEY }}
        run: |
          auth_header() {
            printf 'AUTHORIZATION: basic '
            printf 'x-access-token:%s' "${FFI_DEPLOY_KEY}" | base64 | tr -d '\n'
          }

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "${RELEASE_BRANCH}"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "sync: update sources for ${TAG}"
          git -c "http.extraheader=$(auth_header)" push origin "${RELEASE_BRANCH}"

  kotlin-build-native:
    name: "kotlin: Build ${{ matrix.target }}"
    needs: [kotlin-sync-sources]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            artifact: libcdk_ffi.so
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            artifact: libcdk_ffi.so

          # macOS
          - target: aarch64-apple-darwin
            runner: macos-14
            artifact: libcdk_ffi.dylib

          # Android
          - target: aarch64-linux-android
            runner: ubuntu-22.04
            artifact: libcdk_ffi.so
          - target: armv7-linux-androideabi
            runner: ubuntu-22.04
            artifact: libcdk_ffi.so
          - target: x86_64-linux-android
            runner: ubuntu-22.04
            artifact: libcdk_ffi.so

          # iOS
          - target: aarch64-apple-ios
            runner: macos-14
            artifact: libcdk_ffi.a

    steps:
      - name: Clone cdk-kotlin
        shell: bash
        env:
          FFI_DEPLOY_KEY: ${{ secrets.FFI_DEPLOY_KEY }}
        run: |
          auth_header() {
            printf 'AUTHORIZATION: basic '
            printf 'x-access-token:%s' "${FFI_DEPLOY_KEY}" | base64 | tr -d '\n'
          }

          git -c "http.extraheader=$(auth_header)" \
            clone --branch "${RELEASE_BRANCH}" \
            https://github.com/${{ vars.CDK_KOTLIN_REPO }}.git cdk-kotlin

      - name: Checkout CDK (for Nix flake)
        uses: actions/checkout@v5
        with:
          path: cdk
          ref: refs/tags/${{ env.TAG }}
          fetch-depth: 1
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true

      - name: Build (Nix)
        working-directory: cdk-kotlin/rust
        run: |
          if [[ "${{ matrix.target }}" == *apple-ios* ]]; then
            # iOS builds need system clang and real Xcode SDK paths.
            # The Nix shell injects macOS SDKROOT which breaks xcrun iOS SDK lookup.
            # Same fix as bindings/swift/generate-bindings.sh:57-83.
            XCODE_DEV_DIR=$(/usr/bin/xcrun xcode-select -p 2>/dev/null \
              || echo "/Applications/Xcode.app/Contents/Developer")
            nix develop -L ../../cdk#kotlin-build --command \
              env -u MACOSX_DEPLOYMENT_TARGET -u SDKROOT \
                DEVELOPER_DIR="$XCODE_DEV_DIR" \
                CC_aarch64_apple_ios=/usr/bin/clang \
                CARGO_TARGET_AARCH64_APPLE_IOS_LINKER=/usr/bin/clang \
                cargo build --release --target ${{ matrix.target }}
          else
            nix develop -L ../../cdk#kotlin-build --command \
              cargo build --release --target ${{ matrix.target }}
          fi

      - name: Strip debug symbols
        working-directory: cdk-kotlin/rust
        shell: bash
        run: |
          FILE="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          case "${{ matrix.target }}" in
            *apple*)    strip -S "$FILE" ;;
            *android*)  nix develop -L ../../cdk#kotlin-build --command \
                          bash -c '"$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip" --strip-all '"$FILE" ;;
            *)          strip --strip-all "$FILE" ;;
          esac

      - name: Generate Kotlin bindings (darwin only)
        if: matrix.target == 'aarch64-apple-darwin'
        working-directory: cdk-kotlin/rust
        run: |
          mkdir -p ../generated-bindings
          nix develop -L ../../cdk#kotlin-build --command \
            cargo run --release --bin uniffi-bindgen -- generate \
              --library "target/${{ matrix.target }}/release/${{ matrix.artifact }}" \
              --language kotlin \
              --out-dir ../generated-bindings \
              --no-format

      - name: Upload generated bindings
        if: matrix.target == 'aarch64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-bindings-generated
          path: cdk-kotlin/generated-bindings/

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "cdk-kotlin/rust/target/${{ matrix.target }}/release/${{ matrix.artifact }}" \
             "dist/${{ matrix.target }}-${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-native-${{ matrix.target }}
          path: dist/

  kotlin-publish:
    name: "kotlin: Publish to cdk-kotlin"
    runs-on: ubuntu-latest
    needs: [kotlin-build-native]
    steps:
      - name: Clone cdk-kotlin
        env:
          FFI_DEPLOY_KEY: ${{ secrets.FFI_DEPLOY_KEY }}
        run: |
          auth_header() {
            printf 'AUTHORIZATION: basic '
            printf 'x-access-token:%s' "${FFI_DEPLOY_KEY}" | base64 | tr -d '\n'
          }

          git -c "http.extraheader=$(auth_header)" \
            clone --branch "${RELEASE_BRANCH}" \
            https://github.com/${{ vars.CDK_KOTLIN_REPO }}.git cdk-kotlin

      - name: Checkout CDK (for Nix flake)
        uses: actions/checkout@v5
        with:
          path: cdk
          ref: refs/tags/${{ env.TAG }}
          fetch-depth: 1
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: kotlin-native-*
          merge-multiple: true

      - name: Distribute native libraries to modules
        run: |
          # Map Rust targets to JNA platform directories (cdk-jvm-natives)
          declare -A JNA_MAP=(
            ["x86_64-unknown-linux-gnu"]="linux-x86-64"
            ["aarch64-unknown-linux-gnu"]="linux-aarch64"
            ["aarch64-apple-darwin"]="darwin-aarch64"
          )

          # Map Rust targets to Android ABIs (cdk-android)
          declare -A ANDROID_ABI=(
            ["aarch64-linux-android"]="arm64-v8a"
            ["armv7-linux-androideabi"]="armeabi-v7a"
            ["x86_64-linux-android"]="x86_64"
          )

          # Map Rust targets to iOS platforms (cdk-ios)
          declare -A IOS_MAP=(
            ["aarch64-apple-ios"]="ios-arm64"
          )

          for f in artifacts/*; do
            filename=$(basename "$f")
            # Extract rust target from artifact filename (e.g. "aarch64-apple-darwin-libcdk_ffi.dylib")
            for suffix in libcdk_ffi.so libcdk_ffi.dylib libcdk_ffi.a; do
              if [[ "$filename" == *"-${suffix}" ]]; then
                rust_target="${filename%-${suffix}}"

                # JVM natives
                if [[ -n "${JNA_MAP[$rust_target]+x}" ]]; then
                  jna="${JNA_MAP[$rust_target]}"
                  dst="cdk-kotlin/cdk-jvm-natives/src/main/resources/${jna}"
                  mkdir -p "$dst"
                  cp "$f" "$dst/${suffix}"
                  echo "jvm-natives: ${rust_target} → ${jna}"
                fi

                # Android
                if [[ -n "${ANDROID_ABI[$rust_target]+x}" ]]; then
                  abi="${ANDROID_ABI[$rust_target]}"
                  dst="cdk-kotlin/cdk-android/src/main/jniLibs/${abi}"
                  mkdir -p "$dst"
                  cp "$f" "$dst/${suffix}"
                  echo "android: ${rust_target} → ${abi}"
                fi

                # iOS
                if [[ -n "${IOS_MAP[$rust_target]+x}" ]]; then
                  platform="${IOS_MAP[$rust_target]}"
                  dst="cdk-kotlin/cdk-ios/src/main/resources/${platform}"
                  mkdir -p "$dst"
                  cp "$f" "$dst/${suffix}"
                  echo "ios: ${rust_target} → ${platform}"
                fi

                break
              fi
            done
          done

      - name: Download generated bindings
        uses: actions/download-artifact@v4
        with:
          name: kotlin-bindings-generated
          path: cdk-kotlin/cdk-jvm/src/main/kotlin

      - name: Commit to release branch
        working-directory: cdk-kotlin
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "release: ${TAG} — add bindings and prebuilt binaries"

      - name: Push release branch
        working-directory: cdk-kotlin
        env:
          FFI_DEPLOY_KEY: ${{ secrets.FFI_DEPLOY_KEY }}
        run: |
          auth_header() {
            printf 'AUTHORIZATION: basic '
            printf 'x-access-token:%s' "${FFI_DEPLOY_KEY}" | base64 | tr -d '\n'
          }

          git -c "http.extraheader=$(auth_header)" push origin "${RELEASE_BRANCH}"

      - name: Publish to Maven Central
        working-directory: cdk-kotlin
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          nix develop -L ../cdk#kotlin-publish --command \
            env -u ANDROID_SDK_ROOT \
            ./gradlew \
              :cdk-jvm:publishMavenPublicationToSonatypeRepository \
              :cdk-jvm-natives:publishAllPublicationsToSonatypeRepository \
              :cdk-android:publishReleasePublicationToSonatypeRepository \
              :cdk-ios:publishAllPublicationsToSonatypeRepository \
              closeAndReleaseSonatypeStagingRepository

      - name: Create release on cdk-kotlin
        working-directory: cdk-kotlin
        env:
          GH_TOKEN: ${{ secrets.FFI_DEPLOY_KEY }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          gh release create "${TAG}" \
            --repo ${{ vars.CDK_KOTLIN_REPO }} \
            --target "${COMMIT_SHA}" \
            --title "Release ${TAG}" \
            --generate-notes \
            ${{ inputs.prerelease && '--prerelease' || '' }}

      - name: Merge to default branch
        working-directory: cdk-kotlin
        env:
          FFI_DEPLOY_KEY: ${{ secrets.FFI_DEPLOY_KEY }}
        run: |
          auth_header() {
            printf 'AUTHORIZATION: basic '
            printf 'x-access-token:%s' "${FFI_DEPLOY_KEY}" | base64 | tr -d '\n'
          }

          DEFAULT_BRANCH=$(git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@')
          echo "DEFAULT_BRANCH=${DEFAULT_BRANCH}" >> "$GITHUB_ENV"
          git checkout "${DEFAULT_BRANCH}"
          git merge "${RELEASE_BRANCH}" --squash
          git commit -m "release: ${TAG}"
          git -c "http.extraheader=$(auth_header)" push origin "${DEFAULT_BRANCH}"

      - name: Clean up release branch
        working-directory: cdk-kotlin
        env:
          FFI_DEPLOY_KEY: ${{ secrets.FFI_DEPLOY_KEY }}
        run: |
          auth_header() {
            printf 'AUTHORIZATION: basic '
            printf 'x-access-token:%s' "${FFI_DEPLOY_KEY}" | base64 | tr -d '\n'
          }

          git -c "http.extraheader=$(auth_header)" push origin --delete "${RELEASE_BRANCH}"
