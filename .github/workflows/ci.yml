name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      - "v[0-9]*.[0-9]*.x" # Match version branches like v0.13.x, v1.0.x, etc.
  release:
    types: [created]

# Cancel previous runs on same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  pre-commit-checks:
    name: "Cargo fmt, Nix fmt, typos"
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
          installCommand: nix profile install nixpkgs#cachix
        continue-on-error: true
      - name: Cargo fmt
        run: nix develop -i -L .#stable --command cargo fmt --check
      - name: Nix fmt
        run: nix develop -i -L .#stable --command bash -c "find . -name '*.nix' -not -path './.git/*' -not -path './.jj/*' -print0 | xargs -0 nixpkgs-fmt --check"
      - name: typos
        run: nix develop -i -L .#stable --command typos

  quick-check:
    name: "Quick Check (workspace clippy)"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: pre-commit-checks
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Run workspace clippy
        run: nix develop -i -L .#stable --command cargo clippy --workspace --all-targets -- -D warnings

  # Discover CI check groups from flake - single source of truth
  discover_ci_groups:
    name: "Discover CI groups"
    runs-on: self-hosted
    timeout-minutes: 5
    outputs:
      examples: ${{ steps.groups.outputs.examples }}
      checks: ${{ steps.groups.outputs.checks }}
      msrv_checks: ${{ steps.groups.outputs.msrv_checks }}
      wasm_checks: ${{ steps.groups.outputs.wasm_checks }}
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - name: Get check groups
        id: groups
        run: |
          examples=$(nix eval .#checks.x86_64-linux --apply 'attrs: builtins.filter (n: builtins.substring 0 8 n == "example-") (builtins.attrNames attrs)' --json)
          checks=$(nix eval .#checks.x86_64-linux --apply 'attrs: builtins.filter (n: n != "pre-commit-check" && n != "doc-tests" && n != "strict-docs" && n != "ffi-tests" && builtins.substring 0 8 n != "example-" && builtins.substring 0 5 n != "msrv-" && builtins.substring 0 5 n != "wasm-") (builtins.attrNames attrs)' --json)
          msrv_checks=$(nix eval .#checks.x86_64-linux --apply 'attrs: builtins.filter (n: builtins.substring 0 5 n == "msrv-") (builtins.attrNames attrs)' --json)
          wasm_checks=$(nix eval .#checks.x86_64-linux --apply 'attrs: builtins.filter (n: builtins.substring 0 5 n == "wasm-") (builtins.attrNames attrs)' --json)
          {
            echo "examples=$examples"
            echo "checks=$checks"
            echo "msrv_checks=$msrv_checks"
            echo "wasm_checks=$wasm_checks"
          } >> "$GITHUB_OUTPUT"
          echo "Found examples: $examples"
          echo "Found checks: $checks"
          echo "Found MSRV checks: $msrv_checks"
          echo "Found WASM checks: $wasm_checks"

  examples:
    name: "Examples"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: [pre-commit-checks, discover_ci_groups]
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Build and run examples
        run: |
          set -euo pipefail
          examples='${{ needs.discover_ci_groups.outputs.examples }}'
          examples=$(printf '%s' "$examples" | sed 's/[][]//g; s/"//g; s/,/ /g')
          for example in $examples; do
            echo "::group::Build $example"
            nix build -L ".#$example"
            echo "::endgroup::"

            binary_name="${example#example-}"
            echo "::group::Run $binary_name"
            ./result/bin/"$binary_name"
            echo "::endgroup::"
          done

  # Dynamic clippy + test matrix - uses cached deps from Cachix
  # Each check runs both clippy and unit tests for that crate/feature combination
  clippy-and-test:
    name: "Check: ${{ matrix.check }}"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: [pre-commit-checks, discover_ci_groups]
    strategy:
      fail-fast: false
      matrix:
        check: ${{ fromJson(needs.discover_ci_groups.outputs.checks) }}
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Run clippy and tests
        run: nix build -L .#checks.x86_64-linux.${{ matrix.check }}

  # Pre-build integration test binaries via Nix/Crane (cached by Cachix)
  # This builds both the test harness binaries (included in the regtest dev shell)
  # and the nextest archive containing pre-compiled test binaries.
  build-itest-binaries:
    name: "Build integration test binaries"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: pre-commit-checks
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Build nextest archive and harness binaries
        run: |
          nix build -L \
            .#itest-archive \
            .#start-fake-mint \
            .#start-regtest-mints \
            .#start-fake-auth-mint \
            .#start-regtest \
            .#signatory \
            .#cdk-payment-processor \
            .#cdk-mintd-grpc

  # Tests that require a running PostgreSQL instance
  postgres-tests:
    name: "PostgreSQL Tests"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: pre-commit-checks
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Run clippy and tests for cdk-postgres
        run: nix develop -i -L .#regtest --command bash -c "start-postgres && cargo clippy -p cdk-postgres -- -D warnings && cargo test -p cdk-postgres"

# Tests for cdk-supabase that require a local Supabase stack (PostgREST + GoTrue + PostgreSQL)
  supabase-tests:
    name: "Supabase Tests"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: pre-commit-checks
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Start Supabase local stack
        run: |
          docker compose -f misc/supabase/docker-compose.yml up -d
          # Wait until PostgREST is reachable (it starts after Postgres is healthy)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:54321/rest/v1/ -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7kyqd6gq8zofHRnNe0pZzjJAVHf3nQzRoFk" > /dev/null 2>&1; then
              echo "Supabase REST API is ready"
              break
            fi
            echo "Waiting for Supabase... ($i/30)"
            sleep 3
          done
      - name: Apply CDK wallet schema
        env:
          SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7kyqd6gq8zofHRnNe0pZzjJAVHf3nQzRoFk"
        run: |
          # Generate the schema inside the Nix dev shell, then apply it via the
          # host's Docker CLI (which is not on the Nix shell PATH).
          schema_file="$(mktemp)"
          trap 'rm -f "$schema_file"' EXIT

          nix develop -i -L .#stable --command cargo run --quiet -p cdk-supabase --example print_schema > "$schema_file"

          # Apply the schema. ON_ERROR_STOP makes psql fail (and the step fail)
          # if any statement errors, instead of silently leaving a partial schema.
          docker compose -f misc/supabase/docker-compose.yml exec -T -e PGPASSWORD=supabase db \
            psql -v ON_ERROR_STOP=1 -U supabase_admin -d postgres < "$schema_file"

          # PostgREST caches the DB schema at startup. Since we just created the
          # tables/functions, force a schema-cache reload so the REST API serves
          # them (otherwise every write returns HTTP 404 "table not found").
          docker compose -f misc/supabase/docker-compose.yml exec -T -e PGPASSWORD=supabase db \
            psql -U supabase_admin -d postgres -c "NOTIFY pgrst, 'reload schema';"

          # Wait until PostgREST actually serves our schema before running tests.
          # schema_info is readable by the anon role, so a 200 here means the
          # reloaded cache includes our tables. Use only the apikey header (no
          # Authorization bearer) so PostgREST resolves the anon role directly.
          ready=0
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://localhost:54321/rest/v1/schema_info?limit=1" \
              -H "apikey: ${SUPABASE_ANON_KEY}")
            if [ "$code" = "200" ]; then
              echo "PostgREST schema cache is ready"
              ready=1
              break
            fi
            echo "Waiting for PostgREST schema cache... ($i/30, got HTTP $code)"
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            echo "PostgREST never served the applied schema" >&2
            docker compose -f misc/supabase/docker-compose.yml logs rest >&2 || true
            exit 1
          fi
      - name: Run clippy and tests for cdk-supabase
        env:
          SUPABASE_URL: "http://localhost:54321"
          # Well-known anon key for the default JWT secret used in docker-compose.yml
          SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7kyqd6gq8zofHRnNe0pZzjJAVHf3nQzRoFk"
        run: nix develop -i -L -k SUPABASE_URL -k SUPABASE_ANON_KEY .#stable --command bash -c "cargo clippy -p cdk-supabase --features integration-tests -- -D warnings && cargo test -p cdk-supabase --features integration-tests -- --test-threads 4 && cargo test -p cdk-ffi --features supabase --no-run"
      - name: Stop Supabase local stack
        if: always()
        run: docker compose -f misc/supabase/docker-compose.yml down -v

  regtest-itest:
    name: "Integration regtest tests"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: [pre-commit-checks, build-itest-binaries]
    strategy:
      fail-fast: true
      matrix:
        database: [SQLITE, POSTGRES]
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Resolve nextest archive path
        id: archive
        run: echo "path=$(nix build .#itest-archive --print-out-paths --no-link)/itest-archive.tar.zst" >> $GITHUB_OUTPUT
      - name: Test
        run: nix develop -i -L .#regtest --command bash -c "export TMPDIR=$(mktemp -d -p $PWD) && export CDK_ITEST_ARCHIVE='${{ steps.archive.outputs.path }}' && just itest-ln ${{ matrix.database }}"

  regtest-onchain-itest:
    name: "Integration regtest Onchain tests"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: [pre-commit-checks, build-itest-binaries]
    strategy:
      fail-fast: true
      matrix:
        database: [SQLITE, POSTGRES]
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Resolve nextest archive path
        id: archive
        run: echo "path=$(nix build .#itest-archive --print-out-paths --no-link)/itest-archive.tar.zst" >> $GITHUB_OUTPUT
      - name: Test
        run: nix develop -i -L .#regtest --command bash -c "export TMPDIR=$(mktemp -d -p $PWD) && export CDK_ITEST_ARCHIVE='${{ steps.archive.outputs.path }}' && just itest-onchain ${{ matrix.database }}"

  fake-mint-itest:
    name: "Integration fake mint tests"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: [pre-commit-checks, build-itest-binaries]
    strategy:
      fail-fast: true
      matrix:
        database: [SQLITE, POSTGRES]
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Resolve nextest archive path
        id: archive
        run: echo "path=$(nix build .#itest-archive --print-out-paths --no-link)/itest-archive.tar.zst" >> $GITHUB_OUTPUT
      - name: Test fake mint
        run: nix develop -i -L .#regtest --command bash -c "export TMPDIR=$(mktemp -d -p $PWD) && export CDK_ITEST_ARCHIVE='${{ steps.archive.outputs.path }}' && just fake-mint-itest ${{ matrix.database }}"

  pure-itest:
    name: "Integration fake wallet tests"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: [pre-commit-checks, build-itest-binaries]
    strategy:
      fail-fast: true
      matrix:
        database: [memory, sqlite, redb]
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Resolve nextest archive path
        id: archive
        run: echo "path=$(nix build .#itest-archive --print-out-paths --no-link)/itest-archive.tar.zst" >> $GITHUB_OUTPUT
      - name: Test fake mint
        run: nix develop -i -L .#regtest --command bash -c "export TMPDIR=$(mktemp -d -p $PWD) && export CDK_ITEST_ARCHIVE='${{ steps.archive.outputs.path }}' && just test-pure ${{ matrix.database }}"
      - name: Basic mint integration test
        if: matrix.database == 'memory'
        run: |
          nix develop -i -L .#regtest --command bash -c "
            set -euo pipefail
            export TMPDIR=\$(mktemp -d -p \"\$PWD\")
            export CDK_ITEST_ARCHIVE='${{ steps.archive.outputs.path }}'
            cargo nextest run --archive-file \"\$CDK_ITEST_ARCHIVE\" --workspace-remap . -E \"binary(/^mint$/)\"
          "

  nwc-itest:
    name: "NWC e2e tests"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: [pre-commit-checks, build-itest-binaries]
    strategy:
      fail-fast: true
      matrix:
        database: [memory, sqlite]
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Resolve nextest archive path
        id: archive
        run: echo "path=$(nix build .#itest-archive --print-out-paths --no-link)/itest-archive.tar.zst" >> $GITHUB_OUTPUT
      - name: Test NWC e2e
        run: nix develop -i -L .#regtest --command bash -c "export TMPDIR=$(mktemp -d -p $PWD) && export CDK_ITEST_ARCHIVE='${{ steps.archive.outputs.path }}' && just test-nwc ${{ matrix.database }}"

  payment-processor-itests:
    name: "Payment processor tests"    runs-on: self-hosted
    timeout-minutes: 30
    needs: [pre-commit-checks, build-itest-binaries]
    strategy:
      fail-fast: true
      matrix:
        ln: [FAKEWALLET, CLN, LND]
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Resolve nextest archive path
        id: archive
        run: echo "path=$(nix build .#itest-archive --print-out-paths --no-link)/itest-archive.tar.zst" >> $GITHUB_OUTPUT
      - name: Test
        run: nix develop -i -L .#regtest --command bash -c "export TMPDIR=$(mktemp -d -p $PWD) && export CDK_ITEST_ARCHIVE='${{ steps.archive.outputs.path }}' && just itest-payment-processor ${{matrix.ln}}"

  msrv-build:
    name: "MSRV: ${{ matrix.check }}"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: [pre-commit-checks, discover_ci_groups]
    strategy:
      fail-fast: true
      matrix:
        check: ${{ fromJson(needs.discover_ci_groups.outputs.msrv_checks) }}
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Build
        run: nix build -L .#checks.x86_64-linux.${{ matrix.check }}

  check-wasm:
    name: "WASM: ${{ matrix.check }}"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: [pre-commit-checks, discover_ci_groups]
    strategy:
      fail-fast: true
      matrix:
        check: ${{ fromJson(needs.discover_ci_groups.outputs.wasm_checks) }}
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Build WASM
        run: nix build -L .#checks.x86_64-linux.${{ matrix.check }}

  fake-mint-auth-itest:
    name: "Integration fake mint auth tests"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: [pre-commit-checks, build-itest-binaries]
    strategy:
      fail-fast: true
      matrix:
        database: [SQLITE]
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Resolve nextest archive path
        id: archive
        run: echo "path=$(nix build .#itest-archive --print-out-paths --no-link)/itest-archive.tar.zst" >> $GITHUB_OUTPUT
      - name: Start Keycloak with Backup
        run: |
          docker compose -f misc/keycloak/docker-compose-recover.yml up -d
          until docker logs $(docker ps -q --filter "ancestor=quay.io/keycloak/keycloak:25.0.6") | grep "Keycloak 25.0.6 on JVM (powered by Quarkus 3.8.5) started"; do sleep 1; done
      - name: Verify Keycloak Import
        run: |
          # Wait a bit more for import to complete
          sleep 5
          # Check if the realm endpoint is accessible (better verification than log grep)
          curl -f -s http://127.0.0.1:8080/realms/cdk-test-realm/.well-known/openid-configuration > /dev/null && echo "Keycloak realm successfully imported" || (docker logs $(docker ps -q --filter "ancestor=quay.io/keycloak/keycloak:25.0.6") && exit 1)
      - name: Test fake auth mint
        run: nix develop -i -L .#integration --command bash -c "export TMPDIR=$(mktemp -d -p $PWD) && export CDK_ITEST_ARCHIVE='${{ steps.archive.outputs.path }}' && just fake-auth-mint-itest ${{ matrix.database }} http://127.0.0.1:8080/realms/cdk-test-realm/.well-known/openid-configuration"
      - name: Stop and clean up Docker Compose
        run: |
          docker compose -f misc/keycloak/docker-compose-recover.yml down

  docs:
    name: "Documentation checks"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: pre-commit-checks
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Run doc tests
        run: nix build -L .#checks.x86_64-linux.doc-tests
      - name: Check docs with strict warnings
        run: nix build -L .#checks.x86_64-linux.strict-docs

  ffi-tests:
    name: "FFI Python tests"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: pre-commit-checks
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Run FFI tests
        run: nix build -L .#checks.x86_64-linux.ffi-tests
      - name: Run live Python FFI tests
        run: nix develop -i -L .#ffi --command just ffi-test-live-python

  coverage:
    name: "Code Coverage"
    runs-on: self-hosted
    timeout-minutes: 45
    needs: pre-commit-checks
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Generate Coverage
        run: nix develop -i -L .#integration --command just coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true

  dart-binding-tests:
    name: "Dart binding tests"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: pre-commit-checks
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Build native library and generate bindings
        run: nix develop -L .#bindings --command just binding-dart
      - name: Run Dart tests
        run: nix develop -L .#bindings --command just test-dart

  kotlin-binding-tests:
    name: "Kotlin binding tests"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: pre-commit-checks
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Build native library and generate bindings
        run: nix develop -L .#bindings --command just binding-kotlin
      - name: Run Kotlin tests
        run: nix develop -L .#bindings --command just test-kotlin

  go-binding-tests:
    name: "Go binding tests"
    runs-on: self-hosted
    timeout-minutes: 30
    needs: pre-commit-checks
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Build native library and generate bindings
        run: |
          result=$(nix build -L .#go-bindings --print-out-paths --no-link)
          lib=$(find "$result/lib" -type f -name 'libcdk_ffi_go.*' -print -quit)
          if [ -z "$lib" ]; then
            echo "ERROR: Could not find libcdk_ffi_go in $result/lib"
            ls -la "$result/lib"
            exit 1
          fi
          rm -rf target/bindings/go
          mkdir -p target/bindings/go target/release
          cp -r "$result"/bindings/* target/bindings/go/
          cp "$lib" target/release/
          chmod -R u+w target/bindings/go target/release/$(basename "$lib")
      - name: Run Go tests
        run: nix develop -L .#bindings --command just test-go

  swift-binding-tests:
    name: "Swift binding tests"
    runs-on: macos-latest
    timeout-minutes: 45
    needs: pre-commit-checks
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v17
        with:
          name: cashudevkit
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
        continue-on-error: true
      - name: Build XCFramework and generate bindings
        run: nix develop -L .#bindings --command just ffi-generate-swift
      - name: Run Swift tests
        run: |
          # Run swift test outside the Nix environment. The Nix shell injects
          # SDK paths and compiler flags that conflict with the Xcode Swift compiler.
          env -i \
            HOME="$HOME" \
            PATH="/usr/bin:/bin:/usr/sbin:/sbin" \
            SDKROOT="$(/usr/bin/xcrun --sdk macosx --show-sdk-path)" \
            DEVELOPER_DIR="$(/usr/bin/xcode-select -p)" \
            DYLD_LIBRARY_PATH="$PWD/target/release" \
            /usr/bin/swift test
