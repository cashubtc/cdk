# Minimal Supabase stack for running cdk-supabase integration tests locally and in CI.
#
# Services:
#   - db        PostgreSQL 15 (Supabase-compatible)
#   - auth      GoTrue (Supabase Auth)
#   - rest      PostgREST (Supabase REST API)
#
# Usage:
#   docker compose -f misc/supabase/docker-compose.yml up -d
#   # Wait for the stack to be healthy, then apply the CDK wallet schema:
#   docker compose -f misc/supabase/docker-compose.yml exec db \
#       psql -U supabase_admin -d postgres -f /tmp/schema.sql
#   # Or pipe the SQL output of `SupabaseWalletDatabase::get_schema_sql()`:
#   cargo run -p cdk-supabase --example print_schema | \
#       docker compose -f misc/supabase/docker-compose.yml exec -T db \
#           psql -U supabase_admin -d postgres
#
# Environment variables (override via .env or shell):
#   POSTGRES_PASSWORD   – superuser password (default: supabase)
#   JWT_SECRET          – GoTrue / PostgREST shared JWT secret (default: super-secret-jwt-token-with-at-least-32-characters-long)
#   ANON_KEY            – pre-generated anon JWT signed with JWT_SECRET
#   SERVICE_ROLE_KEY    – pre-generated service_role JWT signed with JWT_SECRET
#
# The default ANON_KEY and SERVICE_ROLE_KEY below are the well-known development
# keys generated for the default JWT_SECRET above (same as `supabase start`).

services:
  db:
    image: supabase/postgres:15.8.1.060
    restart: unless-stopped
    ports:
      - "54322:5432"
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-supabase}"
      POSTGRES_DB: postgres
      JWT_SECRET: "${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}"
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - supabase_network

  auth:
    image: supabase/gotrue:v2.174.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: "http://localhost:54321"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: "postgres://supabase_auth_admin:${POSTGRES_PASSWORD:-supabase}@db:5432/postgres"
      GOTRUE_SITE_URL: "http://localhost:54321"
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_SECRET: "${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: "admin@example.com"
      GOTRUE_SMTP_HOST: ""
      GOTRUE_SMTP_PORT: "587"
      GOTRUE_SMTP_USER: ""
      GOTRUE_SMTP_PASS: ""
      GOTRUE_SMTP_SENDER_NAME: ""
      GOTRUE_MAILER_URLPATHS_INVITE: "/auth/v1/verify"
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: "/auth/v1/verify"
      GOTRUE_MAILER_URLPATHS_RECOVERY: "/auth/v1/verify"
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: "/auth/v1/verify"
    ports:
      - "54324:9999"
    networks:
      - supabase_network

  rest:
    image: postgrest/postgrest:v12.2.8
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: "postgres://authenticator:${POSTGRES_PASSWORD:-supabase}@db:5432/postgres"
      PGRST_DB_SCHEMAS: "public,storage,graphql_public"
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: "${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}"
      PGRST_DB_USE_LEGACY_GUCS: "false"
    ports:
      - "54323:3000"
    networks:
      - supabase_network

  # Kong acts as the single ingress, routing /auth/ → GoTrue and /rest/ → PostgREST,
  # mirroring what the Supabase CLI exposes on port 54321.
  kong:
    image: kong:2.8.1
    restart: unless-stopped
    depends_on:
      - auth
      - rest
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./kong.yml:/var/lib/kong/kong.yml:ro
    ports:
      - "54321:8000"
    networks:
      - supabase_network

networks:
  supabase_network:
    driver: bridge
