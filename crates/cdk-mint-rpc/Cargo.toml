[package]
name = "cdk-mint-rpc"
version.workspace = true
edition.workspace = true
authors = ["CDK Developers"]
description = "CDK mintd mint management RPC client and server"
license.workspace = true
homepage = "https://github.com/cashubtc/cdk"
repository = "https://github.com/cashubtc/cdk.git"
rust-version.workspace = true                            # MSRV
readme = "README.md"

# Disable missing docs warnings for generated code
[package.metadata]
rustdoc-args = ["--allow-missing-docs"]

[dependencies]
anyhow.workspace = true
cdk = { workspace = true, features = [
    "mint",
] }
cdk-http-client = { workspace = true, features = ["bitreq"] }
cdk-common = { workspace = true, features = ["grpc"] }
clap.workspace = true
tonic = { workspace = true, features = ["transport", "tls-ring", "codegen", "router"] }
tracing.workspace = true
tokio.workspace = true
tokio-stream = { workspace = true, features = ["net"] }
serde_json.workspace = true
serde.workspace = true
thiserror.workspace = true
tonic-prost.workspace = true
prost.workspace = true
rustls.workspace = true


[dev-dependencies]
cdk-sqlite = { workspace = true }
cdk-fake-wallet = { workspace = true }
bip39.workspace = true

[build-dependencies]
tonic-prost-build.workspace = true

[lints]
workspace = true
