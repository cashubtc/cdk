[[example]]
name = "nostr_backup"
required-features = ["wallet", "nostr"]

[[example]]
name = "token-proofs"
required-features = ["wallet"]

[[example]]
name = "npubcash"
required-features = ["npubcash"]

[[example]]
name = "nwc"
required-features = ["nwc"]

[[example]]
name = "multimint-npubcash"
required-features = ["npubcash"]

[[example]]
name = "configure_wallet"
required-features = ["wallet"]

[[example]]
name = "receive-token"
