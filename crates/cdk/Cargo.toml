[package]
name = "cdk"
version.workspace = true
edition.workspace = true
authors = ["CDK Developers"]
description = "Core Cashu Development Kit library implementing the Cashu protocol"
homepage = "https://github.com/cashubtc/cdk"
repository = "https://github.com/cashubtc/cdk.git"
rust-version.workspace = true                                                            # MSRV
license.workspace = true


[features]
default = ["mint", "wallet", "nostr", "bip353"]
wallet = [
    "dep:cdk-http-client",
    "dep:futures",
    "cdk-common/wallet",
    "cdk-common/http",
    "dep:rustls",
]
nostr = ["wallet", "dep:nostr-sdk", "cdk-common/nostr"]
npubcash = ["wallet", "nostr", "dep:cdk-npubcash"]
nwc = ["wallet", "nostr", "dep:cdk-nwc"]
mint = ["dep:futures", "cdk-common/mint", "cdk-common/http", "cdk-signatory"]
bip353 = ["wallet", "cdk-common/bip353", "cdk-http-client?/bip353"]
bench = []
http_subscription = []
tor = [
    "wallet",
    "cdk-http-client/tor",
]
prometheus = ["dep:cdk-prometheus"]

[dependencies]
arc-swap = "1.7.1"
cdk-common = { workspace = true, default-features = false }
cbor-diag.workspace = true
async-trait.workspace = true
anyhow.workspace = true
bitcoin.workspace = true
ciborium.workspace = true
lightning.workspace = true
lightning-invoice.workspace = true
regex.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_with.workspace = true
tracing.workspace = true
thiserror.workspace = true

futures = { workspace = true, optional = true, features = ["alloc"] }
url.workspace = true
uuid.workspace = true
jsonwebtoken.workspace = true
nostr-sdk = { workspace = true, optional = true }
cdk-npubcash = { workspace = true, default-features = false, optional = true }
cdk-nwc = { workspace = true, optional = true }
cdk-prometheus = {workspace = true, optional = true}
bitcoin-payment-instructions = { workspace = true }
web-time.workspace = true
zeroize = "1"
tokio-util.workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
cdk-http-client = { workspace = true, default-features = false, optional = true }
tokio = { workspace = true, features = [
    "rt-multi-thread",
    "time",
    "macros",
    "sync",
] }
getrandom = { version = "0.2" }
cdk-signatory = { workspace = true, features = ["grpc"], optional = true }
# Tor dependencies (optional; enabled by feature "tor")
rustls = { workspace = true, optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
cdk-http-client = { workspace = true, default-features = false, optional = true }
tokio = { workspace = true, default-features = false, features = ["rt", "macros", "sync", "time"] }
cdk-signatory = { workspace = true, default-features = false }
getrandom = { version = "0.2", features = ["js"] }
ring = { version = "0.17.14", features = ["wasm32_unknown_unknown_js"] }
rustls = { workspace = true, optional = true }

uuid = { workspace = true, features = ["js"] }
gloo-timers = { version = "0.3", features = ["futures"] }

[[example]]
name = "mint-token"
required-features = ["wallet"]

[[example]]
name = "batch-mint"
required-features = ["wallet"]

[[example]]
name = "melt-token"
required-features = ["wallet"]

[[example]]
name = "p2pk"
required-features = ["wallet"]

[[example]]
name = "wallet"
required-features = ["wallet"]

[[example]]
name = "proof-selection"
required-features = ["wallet"]

[[example]]
name = "auth_wallet"
required-features = ["wallet"]

[[example]]
name = "bip353"
required-features = ["wallet", "bip353"]

[[example]]
name = "mint-token-bolt12-with-stream"
required-features = ["wallet"]

[[example]]
name = "mint-token-bolt12-with-custom-http"
required-features = ["wallet"]

[[example]]
name = "mint-token-bolt12"
required-features = ["wallet"]

[[example]]
name = "human_readable_payment"
required-features = ["wallet", "bip353"]

[[example]]
name = "resolve_human_readable"
required-features = ["wallet", "bip353"]

[[example]]
name = "payment_request"
