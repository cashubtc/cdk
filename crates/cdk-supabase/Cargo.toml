[package]
name = "cdk-supabase"
version.workspace = true
edition.workspace = true
authors = ["CDK Developers"]
description = "Supabase storage backend for CDK"
license.workspace = true
homepage = "https://github.com/cashubtc/cdk"
repository = "https://github.com/cashubtc/cdk.git"
rust-version.workspace = true

[features]
default = ["wallet"]
wallet = ["cdk-common/wallet", "cdk-common/http"]
integration-tests = []

[dependencies]
async-trait.workspace = true
cdk-common = { workspace = true, features = ["test"] }
bitcoin.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
tracing.workspace = true
serde.workspace = true
serde_json.workspace = true
lightning-invoice.workspace = true
uuid.workspace = true
reqwest = { workspace = true }
url.workspace = true
once_cell.workspace = true
urlencoding = "2.1"
aes-gcm = "0.10"
scrypt = { version = "0.12.0", default-features = false }
paste.workspace = true

[dev-dependencies]
mockito = { version = "1", default-features = false }

[lints]
workspace = true
