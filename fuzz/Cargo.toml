[package]
name = "cdk-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }
serde_json = "1"
bitcoin = { version = "0.32.2", default-features = false }

[dependencies.cashu]
path = "../crates/cashu"

[lib]
name = "cdk_fuzz"
path = "src/lib.rs"

[[bin]]
name = "fuzz_token"
path = "fuzz_targets/fuzz_token.rs"
test = false
doc = false
bench = false

