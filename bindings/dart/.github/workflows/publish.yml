name: Build & Publish Dart Bindings

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to create for release (e.g. v0.17.0)'
        required: true
      cdk_version:
        description: 'CDK dependency version (e.g. 0.17.0). Defaults to release_tag without the "v" prefix.'
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  update-cargo:
    name: "Update CDK version in Cargo.toml"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Update CDK version and push
        run: |
          TAG="${{ inputs.release_tag }}"
          CDK_VER="${{ inputs.cdk_version }}"
          CDK_VER="${CDK_VER:-${TAG#v}}"
          RELEASE_VER="${TAG#v}"
          echo "Setting CDK version to ${CDK_VER}, release version to ${RELEASE_VER}"
          sed -i "s/^version = \".*\"/version = \"${CDK_VER}\"/" rust/Cargo.toml
          sed -i "s/cdk-ffi = { version = \"=[^\"]*\"/cdk-ffi = { version = \"=${CDK_VER}\"/" rust/Cargo.toml
          sed -i "s/^version: \".*\"/version: \"${RELEASE_VER}\"/" pubspec.yaml
          cat rust/Cargo.toml
          cat pubspec.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rust/Cargo.toml pubspec.yaml
          git diff --cached --quiet && echo "No changes needed" && exit 0
          git commit -m "ci: update cdk version to ${CDK_VER}"
          git push

  build-native:
    name: "Build ${{ matrix.target }}"
    needs: [update-cargo]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            artifact: libcdk_ffi_dart.so
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            artifact: libcdk_ffi_dart.so

          # macOS
          - target: aarch64-apple-darwin
            runner: macos-14
            artifact: libcdk_ffi_dart.dylib

          # Windows
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: cdk_ffi_dart.dll

          # Android
          - target: aarch64-linux-android
            runner: ubuntu-22.04
            artifact: libcdk_ffi_dart.so
          - target: armv7-linux-androideabi
            runner: ubuntu-22.04
            artifact: libcdk_ffi_dart.so
          - target: x86_64-linux-android
            runner: ubuntu-22.04
            artifact: libcdk_ffi_dart.so

          # iOS
          - target: aarch64-apple-ios
            runner: macos-14
            artifact: libcdk_ffi_dart.a

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Android)
        if: contains(matrix.target, 'android')
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!contains(matrix.target, 'android')"
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross / Android)
        if: contains(matrix.target, 'android')
        working-directory: rust
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip debug symbols
        shell: bash
        run: |
          FILE="rust/target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          case "${{ matrix.target }}" in
            *windows*)  strip --strip-all "$FILE" ;;
            *apple*)    strip -S "$FILE" ;;
            *android*)  "$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip" --strip-all "$FILE" ;;
            *)          strip --strip-all "$FILE" ;;
          esac

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "rust/target/${{ matrix.target }}/release/${{ matrix.artifact }}" \
             "dist/${{ matrix.target }}-${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: dist/

  generate-bindings:
    name: "Generate Dart bindings"
    needs: [update-cargo]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build cdylib
        working-directory: rust
        run: cargo build --release

      - name: Generate Dart sources
        working-directory: rust
        run: |
          mkdir -p ../lib/src/generated
          cargo run --release --bin uniffi-bindgen -- \
            target/release/libcdk_ffi_dart.so \
            --out-dir ../lib/src/generated

      - name: Upload generated sources
        uses: actions/upload-artifact@v4
        with:
          name: generated-dart
          path: lib/src/generated/

  commit-and-release:
    name: "Commit prebuilt & optionally release"
    runs-on: ubuntu-latest
    needs: [build-native, generate-bindings]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: native-*
          merge-multiple: true

      - name: Download generated Dart sources
        uses: actions/download-artifact@v4
        with:
          name: generated-dart
          path: ./lib/src/generated/

      - name: Organize prebuilt binaries
        run: |
          rm -rf prebuilt
          mkdir -p prebuilt

          for f in artifacts/*; do
            filename=$(basename "$f")
            for suffix in libcdk_ffi_dart.so libcdk_ffi_dart.dylib libcdk_ffi_dart.a cdk_ffi_dart.dll; do
              if [[ "$filename" == *"-${suffix}" ]]; then
                target="${filename%-${suffix}}"
                mkdir -p "prebuilt/${target}"
                cp "$f" "prebuilt/${target}/${suffix}"
                break
              fi
            done
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prebuilt/ lib/src/generated/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update prebuilt binaries and generated bindings [skip ci]"
          git push

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.release_tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "Release $TAG" \
            --generate-notes
