name: cdk
description: An implementation of the CDK wallet
version: "0.15.0"
repository: https://github.com/cashubtc/cdk
homepage: https://github.com/cashubtc

environment:
  sdk: "^3.10.0"

dependencies:
  ffi: ^2.1.4
  native_toolchain_rust: ^1.0.3
  hooks: ^1.0.0

dev_dependencies:
  test: ^1.26.2

native:
  rules:
    - include: "**/*.dart"

hooks:
  build: hook/build.dart
