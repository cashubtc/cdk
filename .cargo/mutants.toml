# Mutation Testing Configuration for CDK
# Phase 1: Focus on cashu crate only

# Start with cashu crate only - exclude other crates initially
exclude_globs = [
    "crates/cdk-*/**",  # Exclude other crates initially
    "**/tests/**",      # Don't mutate test code
    "**/benches/**",    # Don't mutate benchmarks
]

# Reasonable timeout to catch hangs (5 minutes minimum)
minimum_test_timeout = 300

# Skip specific mutations that cause infinite loops
# These mutations create scenarios where loops never terminate or recursive functions never return.
# Format: "file.rs:line.*pattern"
exclude_re = [
    # dhke.rs:61 - Mutating counter += to *= causes infinite loop (counter stays 0)
    "crates/cashu/src/dhke.rs:61:.*replace \\+= with \\*=",

    # amount.rs hang-inducing or resource-exhaustion mutations.
    # Match on mutant description instead of line numbers so these remain stable
    # when amount.rs is refactored.
    "crates/cashu/src/amount.rs:.*replace % with / in Amount<\\(\\)>::split",
    "crates/cashu/src/amount.rs:.*replace % with \\+ in Amount<\\(\\)>::split",
    "crates/cashu/src/amount.rs:.*replace / with \\* in Amount<\\(\\)>::split",
    "crates/cashu/src/amount.rs:.*replace <impl Clone for Amount<\\(\\)>>::clone -> Self with Default::default\\(\\)",
    "crates/cashu/src/amount.rs:.*replace Amount<\\(\\)>::split -> Result<Vec<Self>, Error> with Ok\\(vec!\\[\\]\\)",
    "crates/cashu/src/amount.rs:.*replace Amount<\\(\\)>::split -> Result<Vec<Self>, Error> with Ok\\(vec!\\[Default::default\\(\\)\\]\\)",
    "crates/cashu/src/amount.rs:.*replace Amount<\\(\\)>::checked_add -> Option<Amount<\\(\\)>> with Some\\(Amount::from\\(\\)\\)",
    "crates/cashu/src/amount.rs:.*replace Amount<\\(\\)>::checked_add -> Option<Amount<\\(\\)>> with Some\\(Amount::new\\(\\)\\)",
    "crates/cashu/src/amount.rs:.*replace Amount<\\(\\)>::checked_add -> Option<Amount<\\(\\)>> with Some\\(Amount::new\\(\\(\\)\\)\\)",
    "crates/cashu/src/amount.rs:.*replace Amount<\\(\\)>::checked_add -> Option<Amount<\\(\\)>> with Some\\(Amount::from_iter\\(\\[\\(\\)\\]\\)\\)",
    "crates/cashu/src/amount.rs:.*replace Amount<\\(\\)>::try_sum -> Result<Self, Error> with Ok\\(Default::default\\(\\)\\)",
    "crates/cashu/src/amount.rs:.*replace <impl From<u64> for Amount<\\(\\)>>::from -> Self with Default::default\\(\\)",
    "crates/cashu/src/amount.rs:.*replace <impl std::ops::Sub for Amount<\\(\\)>>::sub -> Self::Output with Default::default\\(\\)",

    # Trivial getters/setters - not worth testing
    "FeeAndAmounts::fee",
    "FeeAndAmounts::amounts",
    "BlindedMessage::witness",
    "crates/cashu/src/amount.rs:.*to_u64",

    # Trivial trait implementations - unrealistic mutations
    "crates/cashu/src/amount.rs.*impl From<&u64> for Amount.*from",
    "crates/cashu/src/amount.rs.*impl AsRef<u64> for Amount.*as_ref",
    "crates/cashu/src/amount.rs.*impl std::ops::Mul for Amount.*mul",
    "crates/cashu/src/amount.rs.*impl std::ops::Div for Amount.*div",
    "crates/cashu/src/amount.rs.*impl From<Amount> for u64.*from",
    "crates/cashu/src/amount.rs.*impl Default for Amount",
    "crates/cashu/src/amount.rs.*impl Default for &Amount",
    "crates/cashu/src/amount.rs.*impl.*Display for Amount.*fmt",

    # amount_for_offer requires constructing lightning Offer objects which is complex
    "crates/cashu/src/amount.rs.*amount_for_offer",

    # hash_to_curve boundary check - would require finding a message that needs exactly 2^16
    # iterations which is impractical. The < vs <= mutation is not realistically testable.
    "crates/cashu/src/dhke.rs:49:.*replace < with",

    # Secret::drop zeroizes memory for security. Testing this properly requires unsafe memory
    # inspection. The security guarantee comes from using the zeroize crate correctly.
    "crates/cashu/src/secret.rs.*impl Drop for Secret.*drop",
    "crates/cashu/src/nuts/nut01/secret_key.rs:.*impl Drop for SecretKey.*drop",

    # SecretKeyVisitor/SecretVisitor::expecting are serde diagnostics only.
    "crates/cashu/src/nuts/nut01/secret_key.rs:.*SecretKeyVisitor.*expecting",
    "crates/cashu/src/nuts/nut10/secret.rs:.*SecretVisitor.*expecting",

    # Inline benchmark harness is not runtime behavior.
    "crates/cashu/src/nuts/nut01/public_key.rs:.*benches::public_key_from_hex",

    # TlvReader constant-success mutations with type 0 never advance through unknown TLVs
    # and cause non-progress in decode loops.
    "crates/cashu/src/nuts/nut26/encoding.rs:.*TlvReader.*read_tlv.*Ok\\(Some\\(\\(0, vec!",
    "crates/cashu/src/nuts/nut26/encoding.rs:.*TlvReader.*read_tlv.*replace \\+= with -=",
    "crates/cashu/src/nuts/nut26/encoding.rs:.*replace \\+= with -= in TlvReader.*read_tlv",

    # serialize_to_cbor_diag is only used for CLI diagnostic output (decode_token, decode_request).
    # Not part of any critical path - purely human-readable debugging output.
    "crates/cashu/src/util/mod.rs.*serialize_to_cbor_diag",

    # PartialOrd canonical implementation - just delegates to Ord::cmp, this is standard Rust idiom
    "crates/cashu/src/nuts/nut00/mod.rs:.*impl PartialOrd for Proof.*partial_cmp",

    # Trivial getters in nut00
    "crates/cashu/src/nuts/nut00/mod.rs:.*PaymentMethod::is_known",
    "crates/cashu/src/nuts/nut00/mod.rs:.*PaymentMethod::is_custom",
    "crates/cashu/src/nuts/nut00/mod.rs:.*PaymentMethod::is_bolt11",
    "crates/cashu/src/nuts/nut00/mod.rs:.*impl fmt::Display for KnownMethod.*fmt",

    # Trivial PartialEq implementations - simple delegation for ergonomic comparisons
    "crates/cashu/src/nuts/nut00/mod.rs:.*impl PartialEq<&str> for PaymentMethod.*eq",
    "crates/cashu/src/nuts/nut00/mod.rs:.*impl PartialEq<str> for PaymentMethod.*eq",
    "crates/cashu/src/nuts/nut00/mod.rs:.*impl PartialEq<PaymentMethod> for &str.*eq",
    "crates/cashu/src/nuts/nut00/mod.rs:.*impl PartialEq<KnownMethod> for PaymentMethod.*eq",
    "crates/cashu/src/nuts/nut00/mod.rs:.*impl PartialEq<PaymentMethod> for KnownMethod.*eq",

    # saturating_sub boundary comparison - extensively tested, mutation doesn't change behavior
    "crates/cashu/src/amount.rs:.*replace > with >= in Amount<\\(\\)>::saturating_sub",

    # Secret trivial getters - standard Rust patterns, well-tested indirectly
    "crates/cashu/src/secret.rs:.*Secret::len",
    "crates/cashu/src/secret.rs:.*Secret::is_empty",

    # Witness Display impl - not used in database (uses serde_json directly), debugging only
    "crates/cashu/src/nuts/nut00/mod.rs:.*impl.*Display for Witness.*fmt",

    # PreMint PartialOrd - canonical delegation to Ord::cmp, standard Rust idiom
    "crates/cashu/src/nuts/nut00/mod.rs:.*impl PartialOrd for PreMint.*partial_cmp",

    # PreMintSecrets trivial methods - standard delegation patterns
    "crates/cashu/src/nuts/nut00/mod.rs:.*PreMintSecrets::iter",
    "crates/cashu/src/nuts/nut00/mod.rs:.*PreMintSecrets::is_empty",

    # msg_to_sign preallocation capacity does not affect the signed bytes.
    "crates/cashu/src/nuts/nut20.rs:39:.*MintRequest<.*>::msg_to_sign",
    "crates/cashu/src/nuts/nut29.rs:88:.*BatchMintRequest<.*>::msg_to_sign",

    # legacy_mint_quote_msg_to_sign arithmetic only sizes a Vec allocation; it
    # does not affect the bytes appended to the signing message.
    "crates/cashu/src/nuts/nut20.rs:.*replace \\+ with \\* in legacy_mint_quote_msg_to_sign",
    "crates/cashu/src/nuts/nut20.rs:.*replace \\* with \\+ in legacy_mint_quote_msg_to_sign",
    "crates/cashu/src/nuts/nut20.rs:.*replace \\* with / in legacy_mint_quote_msg_to_sign",

    # Equivalent max update: assigning the same value when sigs == sigs_required
    # leaves enforce_sig_flag unchanged.
    "crates/cashu/src/nuts/nut11/mod.rs:.*replace > with >= in enforce_sig_flag",

    # Feature-gated behind wallet+nostr; the default cashu mutation profile does
    # not compile or run these tests. The weekly NUT-27 Nostr job and
    # `just mutants-cashu-nut27-nostr` cover this file with --no-config so this
    # default-profile exclude does not apply there.
    "crates/cashu/src/nuts/nut27.rs:.*",

    # Equivalent bit operation in hex decoding: high << 4 and low nibble never
    # overlap, so OR and XOR produce identical bytes.
    "crates/cashu/src/util/hex.rs:.*replace \\| with \\^ in decode",

    # These builder constructors intentionally return Default::default().
    "crates/cashu/src/nuts/nut18/payment_request.rs:.*PaymentRequest::builder",
    "crates/cashu/src/nuts/nut18/transport.rs:.*Transport::builder",

    # Length guard forced true is equivalent: non-2 array lengths still fail
    # either missing response lookup or tuple deserialization.
    "crates/cashu/src/nuts/nut17/mod.rs:.*items\\.len\\(\\) == 2 with true",

    # Deleting this arm only changes the diagnostic returned for malformed
    # arrays; they are still rejected by the fallback arm.
    "crates/cashu/src/nuts/nut17/mod.rs:.*delete match arm serde_json::Value::Array\\(_\\) in deserialize_payload_for_kind::custom_response",

    # Target-before-kind transport data is ignored and remains invalid later
    # because no valid target is available for the decoded kind.
    "crates/cashu/src/nuts/nut26/encoding.rs:.*delete match arm None in PaymentRequest::decode_transport",

    # Equivalent Nostr NIP tag encoding: the specialized "n" branch and the
    # generic tag branch both encode the full tag tuple identically.
    "crates/cashu/src/nuts/nut26/encoding.rs:499:.*replace >= with < in PaymentRequest::encode_transport",

    # Equivalent loop boundary: pos == data.len() enters then immediately breaks
    # on the inner type+length guard, same as exiting the loop.
    "crates/cashu/src/nuts/nut26/encoding.rs:.*replace < with <= in PaymentRequest::decode_nprofile",

    # get_pubkeys_and_required_sigs does not currently surface reachable NUT14
    # errors through verify_htlc; malformed preimages are checked later.
    "crates/cashu/src/nuts/nut14/mod.rs:139:.*delete match arm super::nut10::Error::NUT14",

    # Keys/MintKeys trivial delegation - Deref/DerefMut/keys() just return &self.0
    "crates/cashu/src/nuts/nut01/mod.rs:.*impl Deref for Keys.*deref",
    "crates/cashu/src/nuts/nut01/mod.rs:.*Keys::keys",
    "crates/cashu/src/nuts/nut01/mod.rs:.*impl Deref for MintKeys.*deref",
    "crates/cashu/src/nuts/nut01/mod.rs:.*impl DerefMut for MintKeys.*deref_mut",

    # KeysVisitor::expecting - just a diagnostic string for deserialization errors
    "crates/cashu/src/nuts/nut01/mod.rs:.*KeysVisitor.*expecting",

    # MeltMethodSettingsVisitor::expecting - just a diagnostic string for deserialization errors
    "crates/cashu/src/nuts/nut05.rs:.*MeltMethodSettingsVisitor.*expecting",
]
